<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Asep & Ai</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#87CEEB,#fff);
}

/* slide */
.slide{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}
.active{display:flex}

/* card */
.card{
  background:rgba(255,255,255,0.5);
  padding:20px;
  border-radius:20px;
  backdrop-filter:blur(10px);
}

/* button */
button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:white;
  cursor:pointer;
}

/* nav */
.nav{
  position:fixed;
  bottom:10px;
  width:100%;
  text-align:center;
}
.nav button{
  width:10px;
  height:10px;
  border-radius:50%;
  margin:5px;
}

/* flower */
.flower{
  position:fixed;
  top:-50px;
  animation:fall linear infinite;
}
@keyframes fall{
  to{transform:translateY(110vh)}
}
</style>
</head>

<body>

<div id="flowers"></div>

<!-- COVER -->
<div class="slide active" id="cover">
  <img src="cartoon.png" width="150" onerror="this.style.display='none'">
  <h2>The Wedding of</h2>
  <h1>Asep & Ai</h1>
  <p>07 Juni 2026</p>
  <button id="openBtn">Buka Undangan</button>
</div>

<!-- SLIDE 1 -->
<div class="slide" id="s1">
  <div class="card">
    <p id="t1"></p>
    <p id="t2"></p>
    <h2>Asep Ilyas</h2>
    <h2>&</h2>
    <h2>Ai Siti Rahmawati</h2>
  </div>
</div>

<!-- SLIDE 2 -->
<div class="slide" id="s2">
  <div class="card">
    <p id="t3"></p>
    <h3>Minggu, 07 Juni 2026</h3>
    <h3>09:00 WIB</h3>
  </div>
</div>

<!-- SLIDE 3 -->
<div class="slide" id="s3">
  <div class="card">
    <p id="t4"></p>
    <p>
      Kampung Citundun RT.003/RW.008<br>
      Setiawargi, Tamansari<br>
      Tasikmalaya
    </p>

    <iframe width="90%" height="200"
      src="https://maps.google.com/maps?q=tasikmalaya&t=&z=13&output=embed">
    </iframe>
  </div>
</div>

<!-- SLIDE 4 -->
<div class="slide" id="s4">
  <div class="card">
    <p id="t5"></p>
    <p>Terima kasih atas doa & kehadiran</p>
    <h2>444401015688504</h2>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <button data-go="1"></button>
  <button data-go="2"></button>
  <button data-go="3"></button>
  <button data-go="4"></button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

  const slides = document.querySelectorAll(".slide");

  function showSlide(n){
    slides.forEach(s=>s.classList.remove("active"));
    const el = document.getElementById("s"+n);
    if(el) el.classList.add("active");
  }

  document.getElementById("openBtn").onclick = ()=>{
    document.getElementById("cover").classList.remove("active");
    showSlide(1);
  }

  document.querySelectorAll("[data-go]").forEach(btn=>{
    btn.onclick = ()=> showSlide(btn.dataset.go);
  });

  function typing(id,text){
    const el = document.getElementById(id);
    if(!el) return;
    let i=0;
    function type(){
      if(i<text.length){
        el.innerHTML+=text[i];
        i++;
        setTimeout(type,40);
      }
    }
    el.innerHTML="";
    type();
  }

  typing("t1","Bismillahirrahmanirrahim");
  typing("t2","Dan di antara tanda kebesaran-Nya...");
  typing("t3","Acara Pernikahan");
  typing("t4","Lokasi Acara");
  typing("t5","Terima Kasih");

  // flowers
  const container = document.getElementById("flowers");
  for(let i=0;i<15;i++){
    let f=document.createElement("div");
    f.className="flower";
    f.innerHTML="❀";
    f.style.left=Math.random()*100+"vw";
    f.style.animationDuration=(5+Math.random()*5)+"s";
    container.appendChild(f);
  }

});
</script>

</body>
</html>
